name: Bug Report
description: Report a bug in OneEHR
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps or code to reproduce the issue.
      placeholder: |
        1. Run `oneehr preprocess --config ...`
        2. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
  - type: input
    id: version
    attributes:
      label: OneEHR Version
      placeholder: "0.1.0"
  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "3.12"
