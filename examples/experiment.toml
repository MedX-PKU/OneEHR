[dataset]
dynamic = "examples/dynamic.csv"
static = "examples/static.csv"
label = "examples/label.csv"

[preprocess]
bin_size = "1d"
numeric_strategy = "mean"
## categorical codes are represented as:
## - "onehot": (code, value) one-hot per bin (0/1)
## - "count":  per-bin counts
categorical_strategy = "onehot"
code_selection = "frequency" # frequency | all | list | importance
top_k_codes = 100 # or "all"
min_code_count = 1
# Post-merge preprocessing on tabular features (fit on train split only).
# The recommended order is standardization -> imputation.
pipeline = [
  { op = "standardize", cols = "num__*" },
  { op = "impute", strategy = "mean", cols = "num__*" },
]
# For code_selection = "list"
# code_list = ["A", "B", "C"]
# For code_selection = "importance" (e.g., SHAP outputs)
# importance_file = "examples/importance.csv"
# importance_code_col = "code"
# importance_value_col = "importance"

[task]
kind = "binary"
prediction_mode = "patient" # patient (N-1) | time (N-N)

[labels]
# Optional. If provided, used to generate labels from events.
# Format: "path/to/label_fn.py:build_labels"
fn = "examples/label_fn.py:build_labels"
bin_from_time_col = true

[split]
kind = "kfold"
n_splits = 3
seed = 42
val_size = 0.2

# Prospective split example:
# kind = "time"
# time_boundary = "2012-01-01"
# inner_kind = "kfold"        # optional: nested CV on pre-boundary pool
# inner_n_splits = 5

[[models]]
name = "gru"

[[models]]
name = "xgboost"

[hpo]
enabled = true
metric = "val_loss"
mode = "min"
scope = "single" # single | per_split | cv_mean
# Paper-style CV selection:
# scope = "cv_mean" # single | per_split | cv_mean
# Optional: choose which metric to average across splits for cv_mean selection.
# For binary: auroc or auprc; for regression: rmse or mae.
# aggregate_metric = "auroc"
# Optional: which split name to tune on (e.g. fold0 for kfold, split0 for random, time0 for time)
# tune_split = "fold0"

# Example DL HPO (grid over trainer hyperparameters). Benchmark selects best per split.
grid = [
  ["trainer.lr", [1e-3, 3e-4]],
  ["trainer.batch_size", [16, 32]],
]

[hpo_models.xgboost]
enabled = true
metric = "val_auroc"
mode = "max"
grid = [
  ["model.xgboost.max_depth", [4, 6, 8]],
  ["model.xgboost.n_estimators", [200, 500]],
]

# If you switch to time-level tasks, set:
# [task]
# prediction_mode = "time"
# and ensure `labels.fn` returns time-aligned labels.
# For time-level HPO, use `trainer.monitor = "val_loss"` (default).

[trainer]
device = "auto"
seed = 42
max_epochs = 30
batch_size = 64
lr = 1e-3
weight_decay = 0.0
early_stopping = true
early_stopping_patience = 5
monitor = "val_loss"
monitor_mode = "min"
final_refit = "train_val" # train_only | train_val
final_model_source = "refit" # refit | best_split
bootstrap_test = false
bootstrap_n = 200

# Optional: custom loss factory. Signature: loss_fn(task: TaskConfig) -> torch.nn.Module
# loss_fn = "examples/custom_loss.py:make_loss"

[calibration]
# Optional post-hoc probability calibration (binary only), fit on val split.
enabled = false
method = "temperature" # temperature | platt
source = "val"
threshold_strategy = "f1"
use_calibrated = true

# Optional analysis/reporting workflow defaults for `oneehr analyze`.
# The command always writes `analysis/index.json` and module summaries.
#
# [analysis]
# default_modules = [
#   "dataset_profile",
#   "cohort_analysis",
#   "prediction_audit",
#   "temporal_analysis",
#   "interpretability",
#   "agent_audit",
# ]
# top_k = 20
# stratify_by = []
# case_limit = 50
# save_plot_specs = true
# shap_max_samples = 500
#
# Example analysis commands:
# uv run oneehr analyze --config examples/experiment.toml
# uv run oneehr analyze --config examples/experiment.toml --module prediction_audit --module interpretability
# uv run oneehr analyze --config examples/experiment.toml --compare-run logs/baseline_run

# Optional durable case bundles for downstream analysis, notebooks, and agents.
#
# [cases]
# include_static = true
# include_analysis_refs = true
# history_window = "30d"  # optional
# max_events = 200
# time_order = "asc"      # asc | desc
# case_limit = 100        # optional
#
# Cases command:
# uv run oneehr cases build --config examples/experiment.toml

# Optional agent prediction workflow.
#
# [agent.predict]
# enabled = true
# sample_unit = "patient"      # patient | time; must match [task].prediction_mode
# prompt_template = "summary_v1"
# json_schema_version = 1
# max_samples = 500            # optional
# save_prompts = true
# save_responses = true
# save_parsed = true
# concurrency = 1
# max_retries = 2
# timeout_seconds = 60.0
# temperature = 0.0
# top_p = 1.0
#
# [agent.predict.prompt]
# include_static = true
# include_labels_context = false # keep false in v1 to avoid leakage
# history_window = "30d"         # optional
# max_events = 200
# time_order = "asc"
# sections = ["patient_profile", "event_timeline", "code_summary", "prediction_task", "output_schema"]
#
# [agent.predict.output]
# include_explanation = true
# include_confidence = false
#
# [[agent.predict.backends]]
# name = "gpt4o-mini"
# provider = "openai_compatible"
# base_url = "https://api.openai.com/v1"
# model = "gpt-4o-mini"
# api_key_env = "OPENAI_API_KEY"
# supports_json_schema = true
# headers = { }
#
# Agent prediction commands:
# uv run oneehr agent predict --config examples/experiment.toml
# uv run oneehr query agent predict-summary --run-dir logs/example

# Optional agent review workflow over case bundles.
# Cases must exist first, and review targets are selected by prediction origin:
# - "model" -> trained model outputs from preds/
# - "agent" -> agent outputs from agent/predict/preds/
#
# [agent.review]
# enabled = true
# prompt_template = "evidence_review_v1"
# json_schema_version = 1
# prediction_origins = ["model", "agent"] # any subset of model / agent
# max_cases = 100                         # optional
# save_prompts = true
# save_responses = true
# save_parsed = true
# concurrency = 1
# max_retries = 2
# timeout_seconds = 60.0
# temperature = 0.0
# top_p = 1.0
#
# [agent.review.prompt]
# include_static = true
# include_ground_truth = true
# include_analysis_context = true
# max_events = 100
# time_order = "asc"
# sections = [
#   "case_profile",
#   "observed_evidence",
#   "target_prediction",
#   "ground_truth",
#   "analysis_context",
#   "review_rubric",
#   "output_schema",
# ]
#
# [[agent.review.backends]]
# name = "gpt4o-mini-review"
# provider = "openai_compatible"
# base_url = "https://api.openai.com/v1"
# model = "gpt-4o-mini"
# api_key_env = "OPENAI_API_KEY"
# supports_json_schema = true
# headers = { }
#
# Agent review commands:
# uv run oneehr cases build --config examples/experiment.toml
# uv run oneehr agent review --config examples/experiment.toml
# uv run oneehr query agent review-summary --run-dir logs/example

[output]
root = "logs"
run_name = "example"
save_preds = true
