[dataset]
path = "examples/example_events.csv"
file_type = "csv"
patient_id_col = "patient_id"
time_col = "event_time"
code_col = "code"
value_col = "value"
label_col = "label"

[preprocess]
bin_size = "1d"
numeric_strategy = "mean"
categorical_strategy = "count"
top_k_codes = 100
min_code_count = 1

[task]
kind = "binary"
prediction_mode = "patient" # patient (N-1) | time (N-N)

[labels]
# Optional. If provided, used to generate labels from events.
# Format: "path/to/label_fn.py:build_labels"
fn = "examples/label_fn.py:build_labels"
time_col = "label_time"
bin_from_time_col = true

[split]
kind = "kfold"
n_splits = 3
seed = 42
val_size = 0.2

[model]
name = "xgboost"

[trainer]
device = "auto"
seed = 42
max_epochs = 30
batch_size = 64
lr = 1e-3
weight_decay = 0.0
early_stopping = true
early_stopping_patience = 5
monitor = "val_loss"
monitor_mode = "min"
# Optional: custom loss factory. Signature: loss_fn(task: TaskConfig) -> torch.nn.Module
# loss_fn = "examples/custom_loss.py:make_loss"

[output]
root = "outputs"
run_name = "example"
save_preds = true
