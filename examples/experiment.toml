[dataset]
dynamic = "examples/dynamic.csv"
static  = "examples/static.csv"
label   = "examples/label.csv"

[preprocess]
bin_size = "1d"
numeric_strategy = "mean"
categorical_strategy = "onehot"
code_selection = "frequency"
top_k_codes = 100

[task]
kind = "binary"
prediction_mode = "patient"

[split]
kind = "random"
seed = 42
val_size = 0.1
test_size = 0.2

[[models]]
name = "xgboost"
[models.params]
max_depth = 6
n_estimators = 500

[[models]]
name = "gru"
[models.params]
hidden_dim = 128
num_layers = 1

[trainer]
device = "auto"
seed = 42
max_epochs = 30
batch_size = 64
lr = 1e-3
weight_decay = 0.0
grad_clip = 1.0
num_workers = 0
precision = "fp32"
early_stopping = true
patience = 5

