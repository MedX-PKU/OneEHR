[dataset]
path = "examples/example_events.csv"
file_type = "csv"
patient_id_col = "patient_id"
time_col = "event_time"
code_col = "code"
value_col = "value"
label_col = "label"

[preprocess]
bin_size = "1d"
numeric_strategy = "mean"
categorical_strategy = "count"
code_selection = "frequency" # frequency | all | list | importance
top_k_codes = 100 # or "all"
min_code_count = 1
# For code_selection = "list"
# code_list = ["A", "B", "C"]
# For code_selection = "importance" (e.g., SHAP outputs)
# importance_file = "examples/importance.csv"
# importance_code_col = "code"
# importance_value_col = "importance"

[task]
kind = "binary"
prediction_mode = "patient" # patient (N-1) | time (N-N)

[labels]
# Optional. If provided, used to generate labels from events.
# Format: "path/to/label_fn.py:build_labels"
fn = "examples/label_fn.py:build_labels"
time_col = "label_time"
bin_from_time_col = true

[split]
kind = "kfold"
n_splits = 3
seed = 42
val_size = 0.2

# Prospective split example:
# kind = "time"
# time_boundary = "2012-01-01"
# inner_kind = "kfold"        # optional: nested CV on pre-boundary pool
# inner_n_splits = 5

[[models]]
name = "gru"

[[models]]
name = "xgboost"

[hpo]
enabled = true
metric = "val_loss"
mode = "min"
scope = "single" # single | per_split | cv_mean
# Paper-style CV selection:
# scope = "cv_mean" # single | per_split | cv_mean
# Optional: choose which metric to average across splits for cv_mean selection.
# For binary: auroc or auprc; for regression: rmse or mae.
# aggregate_metric = "auroc"
# Optional: which split name to tune on (e.g. fold0 for kfold, split0 for random, time0 for time)
# tune_split = "fold0"

# Example DL HPO (grid over trainer hyperparameters). Benchmark selects best per split.
grid = [
  ["trainer.lr", [1e-3, 3e-4]],
  ["trainer.batch_size", [16, 32]],
]

[hpo_models.xgboost]
enabled = true
metric = "val_auroc"
mode = "max"
grid = [
  ["model.xgboost.max_depth", [4, 6, 8]],
  ["model.xgboost.n_estimators", [200, 500]],
]

# If you switch to time-level tasks, set:
# [task]
# prediction_mode = "time"
# and ensure `labels.fn` returns time-aligned labels.
# For time-level HPO, use `trainer.monitor = "val_loss"` (default).

[trainer]
device = "auto"
seed = 42
max_epochs = 30
batch_size = 64
lr = 1e-3
weight_decay = 0.0
early_stopping = true
early_stopping_patience = 5
monitor = "val_loss"
monitor_mode = "min"
final_refit = "train_val" # train_only | train_val
final_model_source = "refit" # refit | best_split
bootstrap_test = false
bootstrap_n = 200

# Optional: custom loss factory. Signature: loss_fn(task: TaskConfig) -> torch.nn.Module
# loss_fn = "examples/custom_loss.py:make_loss"

[output]
root = "logs"
run_name = "example"
save_preds = true
