# TJH COVID-19 ICU length-of-stay prediction (375 patients, regression)

[dataset]
dynamic = "examples/tjh/dynamic.csv"
static  = "examples/tjh/static.csv"
label   = "examples/tjh/label_los.csv"

[preprocess]
bin_size   = "1d"
top_k_codes = 100

[task]
kind            = "regression"
prediction_mode = "patient"

[split]
kind      = "random"
seed      = 42
val_size  = 0.1
test_size = 0.2

[trainer]
seed           = 42
max_epochs     = 30
batch_size     = 32
lr             = 1e-3
patience       = 5
early_stopping = true

[output]
root     = "runs"
run_name = "tjh_los"

# --- Models ---

[[models]]
name = "xgboost"
[models.params]
n_estimators = 100
max_depth    = 4
learning_rate = 0.1

[[models]]
name = "gru"
[models.params]
hidden_dim = 64
num_layers = 1
