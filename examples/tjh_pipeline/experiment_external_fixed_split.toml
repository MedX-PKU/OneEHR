# TJH external-test with a fixed train/val split (no CV).
#
# Assumes you created:
#   /tmp/oneehr_tjh_split/train/{dynamic,static,label}.csv
#   /tmp/oneehr_tjh_split/val/{dynamic,static,label}.csv
#   /tmp/oneehr_tjh_split/test/{dynamic,static,label}.csv
#
# Run:
#   uv run oneehr preprocess --config examples/tjh_pipeline/experiment_external_fixed_split.toml
#   uv run oneehr train --config examples/tjh_pipeline/experiment_external_fixed_split.toml --force
#   uv run oneehr test --config examples/tjh_pipeline/experiment_external_fixed_split.toml --force

[datasets.train]
dynamic = "/tmp/oneehr_tjh_split/train/dynamic.csv"
static = "/tmp/oneehr_tjh_split/train/static.csv"
label = "/tmp/oneehr_tjh_split/train/label.csv"

[datasets.test]
dynamic = "/tmp/oneehr_tjh_split/test/dynamic.csv"
static = "/tmp/oneehr_tjh_split/test/static.csv"
label = "/tmp/oneehr_tjh_split/test/label.csv"

[preprocess]
bin_size = "1d"
numeric_strategy = "mean"
categorical_strategy = "onehot"
code_selection = "frequency"
top_k_codes = 200
min_code_count = 1
pipeline = [
  { op = "standardize", cols = "num__*" },
  { op = "impute", strategy = "mean", cols = "num__*" },
]

[task]
kind = "binary"
prediction_mode = "patient"

[labels]
fn = "examples/tjh_pipeline/label_fn.py:build_labels"
bin_from_time_col = true

[split]
# Fixed patient-level split on the TRAIN dataset.
kind = "random"
seed = 42
val_size = 0.2
test_size = 0.0

[[models]]
name = "xgboost"

[[models]]
name = "gru"

[trainer]
device = "cpu"
seed = 42
max_epochs = 2
batch_size = 64
lr = 1e-3
weight_decay = 0.0
early_stopping = true
early_stopping_patience = 2
monitor = "val_loss"
monitor_mode = "min"
final_refit = "train_val"
final_model_source = "refit"
bootstrap_test = false
bootstrap_n = 50

[output]
root = "logs"
run_name = "tjh_external_fixed_split"
save_preds = true

