[dataset]
dynamic = "/tmp/oneehr_tjh_example/dynamic.csv"
static = "/tmp/oneehr_tjh_example/static.csv"
label = "/tmp/oneehr_tjh_example/label.csv"

[preprocess]
bin_size = "1d"
numeric_strategy = "mean"
categorical_strategy = "onehot"
code_selection = "frequency"
top_k_codes = 200
min_code_count = 1
pipeline = [
  { op = "standardize", cols = "num__*" },
  { op = "impute", strategy = "mean", cols = "num__*" },
]

[task]
kind = "binary"
prediction_mode = "patient"

[labels]
fn = "examples/tjh_pipeline/label_fn.py:build_labels"
bin_from_time_col = true

[split]
kind = "kfold"
n_splits = 5
seed = 42
val_size = 0.2

[trainer]
device = "cpu"
seed = 42
max_epochs = 2
batch_size = 64
lr = 1e-3
weight_decay = 0.0
early_stopping = true
early_stopping_patience = 2
monitor = "val_loss"
monitor_mode = "min"
final_refit = "train_val"
final_model_source = "refit"
bootstrap_test = false
bootstrap_n = 50

[[models]]
name = "xgboost"

[[models]]
name = "gru"

[output]
root = "logs"
run_name = "tjh_pipeline_example_train"
save_preds = true
