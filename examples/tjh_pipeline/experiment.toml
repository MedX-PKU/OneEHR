[datasets.train]
dynamic = "/path/to/out/train/dynamic.csv"
static = "/path/to/out/train/static.csv"
label = "/path/to/out/train/label.csv"

# Optional external test dataset. Can omit `label` for online inference.
[datasets.test]
dynamic = "/path/to/out/test/dynamic.csv"
static = "/path/to/out/test/static.csv"
# label = "/path/to/out/test/label.csv"

[preprocess]
bin_size = "1d"
numeric_strategy = "mean"
categorical_strategy = "onehot"
code_selection = "frequency"
top_k_codes = 200
min_code_count = 1
pipeline = [
  { op = "standardize", cols = "num__*" },
  { op = "impute", strategy = "mean", cols = "num__*" },
]

[task]
kind = "binary"
prediction_mode = "patient"

[labels]
fn = "examples/tjh_pipeline/label_fn.py:build_labels"
bin_from_time_col = true

[split]
kind = "kfold"
n_splits = 5
seed = 42
val_size = 0.2

[[models]]
name = "xgboost"

[[models]]
name = "gru"

[output]
root = "logs"
run_name = "tjh_pipeline_example"
save_preds = true
