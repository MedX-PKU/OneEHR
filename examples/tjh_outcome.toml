[dataset.dynamic]
path = "/home/yhzhu/projects/pyehr/datasets/tjh/raw/time_series_375_prerpocess_en.xlsx"
converter_fn = "oneehr/data/converters/tjh.py:convert_events"

[preprocess]
bin_size = "1d"
numeric_strategy = "mean"
categorical_strategy = "onehot"
code_selection = "frequency"
top_k_codes = 200
min_code_count = 1
pipeline = [
  { op = "standardize", cols = "num__*" },
  { op = "impute", strategy = "mean", cols = "num__*" },
]

[static_features]
enabled = true

[dataset.static]
# Export a patient-level `static.csv` and point to it here.
path = "/path/to/static.csv"

[task]
kind = "binary"
prediction_mode = "patient"

[labels]
fn = "oneehr/data/converters/tjh.py:build_labels_v2"

[split]
kind = "kfold"
n_splits = 5
seed = 42
val_size = 0.2

[[models]]
name = "xgboost"

[[models]]
name = "gru"

[output]
root = "logs"
run_name = "tjh_outcome"
save_preds = true
