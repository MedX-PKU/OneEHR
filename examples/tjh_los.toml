[dataset]
path = "/home/yhzhu/projects/pyehr/datasets/tjh/raw/time_series_375_prerpocess_en.xlsx"
file_type = "xlsx"
converter_fn = "oneehr/data/converters/tjh.py:convert"

[preprocess]
bin_size = "1d"
numeric_strategy = "mean"
categorical_strategy = "onehot"
code_selection = "frequency"
top_k_codes = 200
min_code_count = 1
pipeline = [
  { op = "standardize", cols = "num__*" },
  { op = "impute", strategy = "mean", cols = "num__*" },
]

[static_features]
enabled = true
cols = ["Sex", "Age"]
agg = "first"

[task]
kind = "regression"
prediction_mode = "patient"

[labels]
fn = "tjh:los"

[split]
kind = "kfold"
n_splits = 5
seed = 42
val_size = 0.2

[[models]]
name = "xgboost"

[[models]]
name = "gru"

[output]
root = "logs"
run_name = "tjh_los"
save_preds = true
