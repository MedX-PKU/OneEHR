site_name: OneEHR
site_description: An all-in-one EHR predictive modeling and analysis library in Python
repo_url: https://github.com/MedX-PKU/OneEHR
repo_name: MedX-PKU/OneEHR
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - Data Model: getting-started/data-model.md
  - User Guide:
      - Preprocessing: guide/preprocessing.md
      - Training: guide/training.md
      - Testing: guide/testing.md
      - Analysis: guide/analysis.md
      - Splits: guide/splits.md
      - HPO (Grid Search): guide/hpo.md
      - Calibration: guide/calibration.md
      - Label Functions: guide/label-functions.md
      - Recipes: guide/recipes.md
  - Reference:
      - CLI: reference/cli.md
      - Configuration: reference/configuration.md
      - Models: reference/models.md
      - Artifacts: reference/artifacts.md
