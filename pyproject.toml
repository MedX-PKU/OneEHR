[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "oneehr"
version = "0.1.0"
description = "An all-in-one EHR predictive modeling and analysis library in Python"
readme = "README.md"
requires-python = ">=3.12"
license = { file = "LICENSE" }
authors = [{ name = "OneEHR Contributors" }]

dependencies = [
  "numpy>=1.24",
  "pandas>=2.0",
  "pyarrow>=14.0",
  "scikit-learn>=1.3",
  "torch>=2.10.0",
  "xgboost>=2.0",
]

[project.optional-dependencies]
ml = [
  "xgboost>=2.0",
  "scikit-learn>=1.3",
]
dl = [
  "torch>=2.1",
]
dev = [
  "pytest>=7.4",
  "ruff>=0.3",
]

[project.scripts]
oneehr = "oneehr.cli.main:main"

[tool.setuptools.packages.find]
where = ["."]
